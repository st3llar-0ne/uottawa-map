<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>uOttawa Campus Map / Carte du campus</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<!-- Official uOttawa fonts: Work Sans (sans) + Spectral (serif) -->
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
/* ─── OFFICIAL uOTTAWA BRAND TOKENS ─────────────────────────────── */
:root{
  --garnet:    #8F001A;
  --garnet-dk: #6B0014;
  --garnet-lt: #A8001F;
  --warm-grey: #80746C;
  --charcoal:  #2D2D2C;
  --lt-grey:   #ACA39A;
  --polar:     #F2F2F2;
  --white:     #FFFFFF;
  --border:    #DDD8D3;
  --shadow:    0 4px 20px rgba(0,0,0,.10);
  /* category colours – chosen to meet WCAG AA on white */
  --c-academic:  #1A4FA0;
  --c-residence: #1A6B3A;
  --c-sports:    #B05A00;
  --c-services:  #5B2D8E;
  --c-library:   #7A4000;
  --c-transit:   #00607A;
  /* route colours */
  --tunnel-col:   #1A4FA0;
  --overpass-col: #B05A00;
  --access-col:   #1A6B3A;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Work Sans',sans-serif;background:var(--polar);color:var(--charcoal);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ─── HEADER ─────────────────────────────────────────────────────── */
header{
  background:var(--garnet);color:var(--white);
  padding:0 20px;height:60px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.30);z-index:1000;
}
.logo-zone{display:flex;align-items:center;gap:11px;flex-shrink:0}
.logo-text h1{font-family:'Spectral',serif;font-size:1.1rem;font-weight:600;line-height:1.2}
.logo-text h1 em{font-style:normal;font-weight:300}
.logo-sub{font-family:'Work Sans',sans-serif;font-size:.6rem;font-weight:400;opacity:.75;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}

/* Language toggle */
.lang-btn{
  background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.35);
  color:var(--white);padding:4px 12px;border-radius:4px;
  font-family:'Work Sans',sans-serif;font-size:.75rem;font-weight:600;
  cursor:pointer;letter-spacing:.05em;transition:background .2s;flex-shrink:0;
}
.lang-btn:hover{background:rgba(255,255,255,.25)}

.header-controls{display:flex;align-items:center;gap:8px}

/* toggle buttons */
.tog{
  background:rgba(255,255,255,.13);border:1.5px solid rgba(255,255,255,.28);
  color:var(--white);padding:5px 12px;border-radius:4px;
  font-family:'Work Sans',sans-serif;font-size:.72rem;font-weight:500;
  cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;
}
.tog:hover{background:rgba(255,255,255,.22)}
.tog.on{background:var(--white);color:var(--garnet);border-color:var(--white);font-weight:700}

/* search */
.sw{position:relative;width:210px}
.sw input{
  width:100%;padding:6px 12px 6px 32px;border:none;border-radius:4px;
  background:rgba(255,255,255,.15);color:var(--white);
  font-family:'Work Sans',sans-serif;font-size:.8rem;outline:none;transition:background .2s;
}
.sw input::placeholder{color:rgba(255,255,255,.5)}
.sw input:focus{background:rgba(255,255,255,.22)}
.s-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);opacity:.6;pointer-events:none}
#sr{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--white);border-radius:4px;box-shadow:var(--shadow);z-index:9999;overflow:hidden;display:none}
.sri{padding:8px 13px;cursor:pointer;font-size:.8rem;color:var(--charcoal);border-bottom:1px solid var(--border);transition:background .15s}
.sri:last-child{border-bottom:none}
.sri:hover{background:var(--polar)}
.sri strong{color:var(--garnet);display:block;font-size:.68rem;margin-top:1px}

/* ─── BODY ───────────────────────────────────────────────────────── */
.app-body{display:flex;flex:1;overflow:hidden}

/* ─── SIDEBAR ────────────────────────────────────────────────────── */
aside{width:285px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:10}
.fh{padding:14px 16px 11px;border-bottom:1px solid var(--border)}
.fh h2{font-family:'Spectral',serif;font-size:.95rem;font-weight:600;margin-bottom:10px;color:var(--charcoal)}
.pills{display:flex;flex-wrap:wrap;gap:5px}
.pill{padding:3px 11px;border-radius:3px;font-size:.68rem;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .18s;letter-spacing:.03em;text-transform:uppercase}
.pill:focus-visible{outline:3px solid var(--charcoal);outline-offset:2px}
.pill.active{color:var(--white) !important}
.pill[data-cat="all"]{border-color:var(--garnet);color:var(--garnet)}.pill[data-cat="all"].active{background:var(--garnet);color:var(--white)}
.pill[data-cat="academic"]{border-color:var(--c-academic);color:var(--c-academic)}.pill[data-cat="academic"].active{background:var(--c-academic)}
.pill[data-cat="residence"]{border-color:var(--c-residence);color:var(--c-residence)}.pill[data-cat="residence"].active{background:var(--c-residence)}
.pill[data-cat="sports"]{border-color:var(--c-sports);color:var(--c-sports)}.pill[data-cat="sports"].active{background:var(--c-sports)}
.pill[data-cat="services"]{border-color:var(--c-services);color:var(--c-services)}.pill[data-cat="services"].active{background:var(--c-services)}
.pill[data-cat="library"]{border-color:var(--c-library);color:var(--c-library)}.pill[data-cat="library"].active{background:var(--c-library)}
.pill[data-cat="transit"]{border-color:var(--c-transit);color:var(--c-transit)}.pill[data-cat="transit"].active{background:var(--c-transit)}

/* route legend strip */
.rl{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;gap:14px;flex-wrap:wrap}
.rl-item{display:flex;align-items:center;gap:5px;font-size:.67rem;color:var(--warm-grey);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.rl-swatch{width:20px;height:4px;border-radius:1px;flex-shrink:0}
.rl-dash{background-image:repeating-linear-gradient(90deg,currentColor 0,currentColor 5px,transparent 5px,transparent 9px)}

/* building list */
.bl{flex:1;overflow-y:auto;padding:4px 0}
.bl::-webkit-scrollbar{width:4px}
.bl::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.bi{display:flex;align-items:flex-start;gap:9px;padding:9px 16px;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.bi:hover{background:var(--polar)}
.bi:focus-visible{outline:3px solid var(--garnet);outline-offset:-3px;background:var(--polar)}
.bi.active{background:var(--garnet);border-left-color:var(--garnet-dk)}
.bi.active .b-name{color:var(--white)}
.bi.active .b-meta{color:rgba(255,255,255,.75)}
.bi.active .b-dot{border:2px solid rgba(255,255,255,.6)}
.b-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.b-info{min-width:0;flex:1}
.b-name{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--charcoal)}
.b-meta{font-size:.67rem;color:var(--warm-grey);margin-top:2px}

/* ─── MAP ────────────────────────────────────────────────────────── */
#map{flex:1;height:100%;z-index:1}

/* ─── POPUP ──────────────────────────────────────────────────────── */
.leaflet-popup-content-wrapper{border-radius:4px!important;box-shadow:0 8px 28px rgba(0,0,0,.18)!important;padding:0!important;overflow:hidden}
.leaflet-popup-content{margin:0!important;width:295px!important}
.leaflet-popup-tip-container{margin-top:-1px}
.ph{padding:12px 16px 10px;color:var(--white)}
.ph h3{font-family:'Spectral',serif;font-size:1rem;font-weight:600;line-height:1.3}
.ph-code{font-size:.65rem;opacity:.78;letter-spacing:.09em;text-transform:uppercase;margin-top:2px;font-family:'Work Sans',sans-serif}

/* tabs */
.ptabs{display:flex;border-bottom:1px solid var(--border)}
.ptab{flex:1;padding:7px 2px;text-align:center;font-size:.65rem;font-weight:700;cursor:pointer;color:var(--warm-grey);border-bottom:2px solid transparent;transition:all .15s;text-transform:uppercase;letter-spacing:.04em;font-family:'Work Sans',sans-serif}
.ptab.active{color:var(--garnet);border-bottom-color:var(--garnet)}
.ppanel{display:none;padding:11px 15px 13px;max-height:185px;overflow-y:auto}
.ppanel.active{display:block}
.ppanel::-webkit-scrollbar{width:3px}
.ppanel::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.ppanel p{font-size:.78rem;color:var(--warm-grey);line-height:1.65;font-family:'Work Sans',sans-serif}

.res-list{list-style:none}
.res-list li{font-size:.76rem;color:var(--charcoal);padding:4px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:7px;line-height:1.45;font-family:'Work Sans',sans-serif}
.res-list li:last-child{border-bottom:none}
.res-list li::before{content:'→';color:var(--garnet);font-weight:700;flex-shrink:0;margin-top:1px}

.acc-list{list-style:none}
.acc-list li{font-size:.76rem;color:var(--charcoal);padding:3px 0;display:flex;align-items:flex-start;gap:7px;line-height:1.45;border-bottom:1px solid var(--border);font-family:'Work Sans',sans-serif}
.acc-list li:last-child{border-bottom:none}
.ai{flex-shrink:0;font-size:.88rem}

.conn-sec{font-size:.76rem;color:var(--charcoal);line-height:1.9;font-family:'Work Sans',sans-serif}
.ctag{display:inline-block;padding:2px 9px;border-radius:3px;font-size:.63rem;font-weight:700;letter-spacing:.04em;margin-right:5px;vertical-align:middle}
.ctag-tunnel{background:#DBEAFE;color:#1E3A8A}
.ctag-overpass{background:#FEF3C7;color:#78350F}
.no-conn{font-size:.76rem;color:var(--warm-grey);font-style:italic;font-family:'Work Sans',sans-serif}

.cat-pill{display:inline-block;padding:2px 10px;border-radius:3px;font-size:.65rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--white);margin-top:7px;font-family:'Work Sans',sans-serif}

/* ─── MAP LEGEND ─────────────────────────────────────────────────── */
.mleg{position:absolute;bottom:26px;right:12px;background:var(--white);border-radius:4px;padding:11px 15px;box-shadow:var(--shadow);z-index:500;font-size:.7rem;font-family:'Work Sans',sans-serif;border-top:3px solid var(--garnet)}
.mleg h4{font-family:'Spectral',serif;font-size:.82rem;font-weight:600;margin-bottom:7px;color:var(--charcoal)}
.lr{display:flex;align-items:center;gap:7px;margin-bottom:4px;color:var(--warm-grey);font-weight:500}
.ldot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.lline{width:20px;height:4px;border-radius:1px;flex-shrink:0}

/* ─── MARKER ─────────────────────────────────────────────────────── */
.cm{display:flex;align-items:center;justify-content:center;border-radius:50%;border:2.5px solid rgba(255,255,255,.9);box-shadow:0 2px 7px rgba(0,0,0,.28);cursor:pointer;transition:transform .15s}
.cm:hover{transform:scale(1.18)}
/* transit marker is a square/diamond */
.cm-transit{border-radius:4px;transform:rotate(45deg)}
.cm-transit:hover{transform:rotate(45deg) scale(1.18)}

/* ─── DIVIDER ────────────────────────────────────────────────────── */
.leg-div{border-top:1px solid var(--border);margin:5px 0}
</style>
</head>
<body>

<header>
  <div class="logo-zone">
    <div class="logo-text">
      <h1 id="h-title">uOttawa <em>Carte du campus</em></h1>
      <div class="logo-sub" id="h-sub">Campus principal · Ottawa, Ontario</div>
    </div>
  </div>

  <div class="header-controls">
    <button class="tog" id="tog-access">♿ <span data-en="Accessibility" data-fr="Accessibilité">Accessibilité</span></button>
    <button class="tog" id="tog-tunnels">🚇 <span data-en="Indoor Routes" data-fr="Trajets intérieurs">Trajets intérieurs</span></button>
    <div class="sw">
      <svg class="s-ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="si" data-placeholder-en="Search buildings…" data-placeholder-fr="Chercher un bâtiment…" placeholder="Chercher un bâtiment…" autocomplete="off"/>
      <div id="sr"></div>
    </div>
    <button class="lang-btn" id="lang-btn">EN</button>
  </div>
</header>

<div class="app-body">
<aside>
  <div class="fh">
    <h2 id="sb-title">Bâtiments</h2>
    <div class="pills">
      <div class="pill active" data-cat="all" data-en="All" data-fr="Tous">Tous</div>
      <div class="pill" data-cat="academic"  data-en="Academic"  data-fr="Académique">Académique</div>
      <div class="pill" data-cat="residence" data-en="Residence" data-fr="Résidence">Résidence</div>
      <div class="pill" data-cat="sports"    data-en="Sports"    data-fr="Sports">Sports</div>
      <div class="pill" data-cat="services"  data-en="Services"  data-fr="Services">Services</div>
      <div class="pill" data-cat="library"   data-en="Library"   data-fr="Bibliothèque">Bibliothèque</div>
      <div class="pill" data-cat="transit"   data-en="Transit"   data-fr="Transport">Transport</div>
    </div>
  </div>
  <div class="rl">
    <div class="rl-item"><div class="rl-swatch rl-dash" style="color:#1A4FA0;background:none"></div><span data-en="Tunnel" data-fr="Tunnel">Tunnel</span></div>
    <div class="rl-item"><div class="rl-swatch rl-dash" style="color:#B05A00;background:none"></div><span data-en="Overpass" data-fr="Passerelle">Passerelle</span></div>
    <div class="rl-item"><span>♿</span><span data-en="Accessible path" data-fr="Trajet accessible">Trajet accessible</span></div>
  </div>
  <div class="bl" id="blist"></div>
</aside>

<div style="position:relative;flex:1;overflow:hidden">
  <div id="map"></div>
  <div class="mleg">
    <h4 id="leg-title">Légende</h4>
    <div class="lr"><div class="ldot" style="background:var(--c-academic)"></div><span data-en="Academic" data-fr="Académique">Académique</span></div>
    <div class="lr"><div class="ldot" style="background:var(--c-residence)"></div><span data-en="Residence" data-fr="Résidence">Résidence</span></div>
    <div class="lr"><div class="ldot" style="background:var(--c-sports)"></div><span data-en="Sports" data-fr="Sports">Sports</span></div>
    <div class="lr"><div class="ldot" style="background:var(--c-services)"></div><span data-en="Services" data-fr="Services">Services</span></div>
    <div class="lr"><div class="ldot" style="background:var(--c-library)"></div><span data-en="Library" data-fr="Bibliothèque">Bibliothèque</span></div>
    <div class="lr"><div class="ldot" style="background:var(--c-transit);border-radius:3px"></div><span data-en="Transit" data-fr="Transport">Transport</span></div>
    <div class="leg-div"></div>
    <div class="lr"><div class="lline" style="background:var(--tunnel-col);background-image:repeating-linear-gradient(90deg,var(--tunnel-col) 0,var(--tunnel-col) 5px,transparent 5px,transparent 9px)"></div><span data-en="Tunnel" data-fr="Tunnel">Tunnel</span></div>
    <div class="lr"><div class="lline" style="background:var(--overpass-col);background-image:repeating-linear-gradient(90deg,var(--overpass-col) 0,var(--overpass-col) 5px,transparent 5px,transparent 9px)"></div><span data-en="Overpass" data-fr="Passerelle">Passerelle</span></div>
    <div class="lr"><div class="lline" style="background:var(--access-col)"></div>♿</div>
  </div>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// LANGUAGE
// ═══════════════════════════════════════════════════════════
let lang = 'fr';
const t = (en,fr) => lang==='en' ? en : fr;

function applyLang(){
  document.getElementById('h-title').innerHTML = lang==='en'
    ? 'uOttawa <em>Campus Map</em>'
    : 'uOttawa <em>Carte du campus</em>';
  document.getElementById('h-sub').textContent = lang==='en'
    ? 'Main Campus · Ottawa, Ontario'
    : 'Campus principal · Ottawa, Ontario';
  document.getElementById('sb-title').textContent = lang==='en' ? 'Buildings' : 'Bâtiments';
  document.getElementById('leg-title').textContent = lang==='en' ? 'Legend' : 'Légende';
  document.getElementById('lang-btn').textContent = lang==='en' ? 'FR' : 'EN';
  document.getElementById('si').placeholder = lang==='en' ? 'Search buildings…' : 'Chercher un bâtiment…';
  document.querySelectorAll('[data-en]').forEach(el=>{
    if(el.tagName==='DIV'&&el.classList.contains('pill')){el.textContent=lang==='en'?el.dataset.en:el.dataset.fr;}
    else if(el.tagName!=='BUTTON'&&el.tagName!=='DIV'){el.textContent=lang==='en'?el.dataset.en:el.dataset.fr;}
    else{el.textContent=lang==='en'?el.dataset.en:el.dataset.fr;}
  });
  document.querySelectorAll('.tog span').forEach(s=>{s.textContent=lang==='en'?s.dataset.en:s.dataset.fr});
  renderList(currentCat);
  // refresh open popup
  if(lastCode) markers[lastCode]&&markers[lastCode].openPopup();
}

document.getElementById('lang-btn').addEventListener('click',()=>{
  lang = lang==='en'?'fr':'en';
  applyLang();
});

// ═══════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════
const catColor={
  academic:  'var(--c-academic)',

  services:  'var(--c-services)',
  library:   'var(--c-library)',
  transit:   'var(--c-transit)',
};

  academic:'#1A4FA0',residence:'#1A6B3A',sports:'#B05A00',

     en:['Accessible entrance with automatic door openers','Elevator access on east side','Accessible washrooms on ground floor','Para Transpo stop nearby on Cumberland St'],

   desc:{en:'Heart of student life. Houses dining, the student union, lounges, and many essential services — including International House, the go-to hub for international students.',

   access:{

   connections:{en:['Corridor to Morisset Library (ground + 2nd)','Corridor to Montpetit (2nd floor)','Overpass to Tabaret (TBT)'],fr:['Corridor vers Morisset (rdc + 2e)','Corridor vers Montpetit (2e)','Passerelle vers Tabaret']},connTypes:['overpass','overpass','overpass']},

const tunnelLayers=[],overpassLayers=[],accessLayers=[];
tunnelRoutes.forEach(r=>{tunnelLayers.push(L.polyline(r.coords,{color:'#1A4FA0',weight:5,opacity:.85,dashArray:'10,6'}).bindTooltip(()=>r.label[lang],{sticky:true}))});
overpassRoutes.forEach(r=>{overpassLayers.push(L.polyline(r.coords,{color:'#B05A00',weight:4,opacity:.82,dashArray:'8,5'}).bindTooltip(()=>r.label[lang],{sticky:true}))});
accessPaths.forEach(r=>{accessLayers.push(L.polyline(r.coords,{color:'#1A6B3A',weight:5,opacity:.9}).bindTooltip(()=>r.label[lang],{sticky:true}))});

let tunnelsOn=false,accessOn=false;
function toggleLayers(layers,on){layers.forEach(l=>on?l.addTo(map):map.removeLayer(l))}
document.getElementById('tog-tunnels').addEventListener('click',function(){
  tunnelsOn=!tunnelsOn;toggleLayers(tunnelLayers,tunnelsOn);toggleLayers(overpassLayers,tunnelsOn);
  this.classList.toggle('on',tunnelsOn);
});
document.getElementById('tog-access').addEventListener('click',function(){
  accessOn=!accessOn;toggleLayers(accessLayers,accessOn);
  this.classList.toggle('on',accessOn);
});

// ═══════════════════════════════════════════════════════════
// MARKERS + POPUPS
// ═══════════════════════════════════════════════════════════
const markers={};let activeEl=null,currentCat='all',lastCode=null;

function makeIcon(cat){
  const c=catColorHex[cat];
  const isTransit=cat==='transit';
  if(isTransit){
    return L.divIcon({className:'',
      html:`<div class="cm cm-transit" style="width:26px;height:26px;background:${c}"></div>`,
      iconSize:[26,26],iconAnchor:[13,13],popupAnchor:[0,-17]});
  }
  return L.divIcon({className:'',
    html:`<div class="cm" style="width:28px;height:28px;background:${c}"></div>`,
    iconSize:[28,28],iconAnchor:[14,14],popupAnchor:[0,-17]});
}

function buildPopup(b){
  const col=catColorHex[b.cat];
  const name=b.name[lang];
  const desc=b.desc[lang];
  const resList=(b.resources[lang]||[]).map(r=>`<li>${r}</li>`).join('');
  const accList=(b.access[lang]||[]).map(a=>`<li><span class="ai">♿</span>${a}</li>`).join('');
  const connHTML=b.connections[lang]&&b.connections[lang].length
    ?b.connections[lang].map((c,i)=>`<div style="margin-bottom:4px"><span class="ctag ctag-${b.connTypes[i]}">${b.connTypes[i]==='tunnel'?(lang==='en'?'🚇 Tunnel':'🚇 Tunnel'):(lang==='en'?'🌉 Overpass':'🌉 Passerelle')}</span>${c}</div>`).join('')
    :`<div class="no-conn">${lang==='en'?'No indoor connections — outdoor walking required':'Aucune connexion intérieure — marche à l\'extérieur requise'}</div>`;
  const tabs=[
    {id:'about',  en:'About',    fr:'À propos'},
    {id:'resources',en:'Resources',fr:'Ressources'},
    {id:'access', en:'Access ♿', fr:'Accès ♿'},
    {id:'routes', en:'Routes',   fr:'Trajets'},
  ];
  const tabHTML=tabs.map((t,i)=>`<div class="ptab${i===0?' active':''}" data-tab="${t.id}">${t[lang]}</div>`).join('');
  return `<div>
    <div class="ph" style="background:${col}">
      <h3>${name}</h3>
      <div class="ph-code">${b.code}</div>
    </div>
    <div class="ptabs">${tabHTML}</div>
    <div class="ppanel active" data-panel="about"><p>${desc}</p><span class="cat-pill" style="background:${col}">${b.cat}</span></div>
    <div class="ppanel" data-panel="resources"><ul class="res-list">${resList}</ul></div>
    <div class="ppanel" data-panel="access"><ul class="acc-list">${accList}</ul></div>
    <div class="ppanel" data-panel="routes"><div class="conn-sec">${connHTML}</div></div>
  </div>`;
}

buildings.forEach(b=>{
  const m=L.marker([b.lat,b.lng],{icon:makeIcon(b.cat)})
    .bindPopup(()=>buildPopup(b),{maxWidth:310})
    .addTo(map);
  m.on('click',()=>{lastCode=b.code;highlightItem(b.code)});
  m.on('popupopen',()=>{setTimeout(()=>{
    const pc=document.querySelector('.leaflet-popup-content');
    if(!pc)return;
    pc.querySelectorAll('.ptab').forEach(tab=>{
      tab.addEventListener('click',()=>{
        pc.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
        pc.querySelectorAll('.ppanel').forEach(p=>p.classList.remove('active'));
        tab.classList.add('active');
        pc.querySelector(`.ppanel[data-panel="${tab.dataset.tab}"]`).classList.add('active');
      });
    });
  },60)});
  markers[b.code]=m;
});

// ═══════════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════════
function renderList(cat){
  const list=document.getElementById('blist');list.innerHTML='';
  const filtered=cat==='all'?buildings:buildings.filter(b=>b.cat===cat);
  filtered.forEach(b=>{
    const el=document.createElement('div');el.className='bi';el.dataset.code=b.code;
    el.innerHTML=`<div class="b-dot" style="background:${catColorHex[b.cat]}"></div>
      <div class="b-info">
        <div class="b-name">${b.name[lang]}</div>
        <div class="b-meta">${b.code} · ${b.cat}</div>
      </div>`;
    el.addEventListener('click',()=>highlightItem(b.code,true));
    list.appendChild(el);
  });
}
renderList('all');

function highlightItem(code,flyTo=false){
  if(activeEl)activeEl.classList.remove('active');
  const el=document.querySelector(`.bi[data-code="${code}"]`);
  if(el){el.classList.add('active');el.scrollIntoView({block:'nearest',behavior:'smooth'});activeEl=el;}
  const b=buildings.find(x=>x.code===code);if(!b)return;
  if(flyTo)map.flyTo([b.lat,b.lng],17,{duration:.8});
  markers[code].openPopup();
  lastCode=code;
}

document.querySelectorAll('.pill').forEach(pill=>{
  pill.addEventListener('click',()=>{
    document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
    pill.classList.add('active');currentCat=pill.dataset.cat;renderList(currentCat);
    buildings.forEach(b=>{const m=markers[b.code];
      if(currentCat==='all'||b.cat===currentCat){if(!map.hasLayer(m))map.addLayer(m);}
      else{if(map.hasLayer(m))map.removeLayer(m);}
    });
  });
});

// ═══════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════
const si=document.getElementById('si'),sr=document.getElementById('sr');
si.addEventListener('input',()=>{
  const q=si.value.toLowerCase().trim();sr.innerHTML='';
  if(!q){sr.style.display='none';return;}
  const hits=buildings.filter(b=>
    b.name[lang].toLowerCase().includes(q)||b.code.toLowerCase().includes(q)||
    b.cat.includes(q)||b.desc[lang].toLowerCase().includes(q)
  ).slice(0,6);
  if(!hits.length){sr.style.display='none';return;}
  hits.forEach(b=>{
    const item=document.createElement('div');item.className='sri';
    item.innerHTML=`${b.name[lang]}<strong>${b.code} · ${b.cat}</strong>`;
    item.addEventListener('click',()=>{
      si.value='';sr.style.display='none';
      if(currentCat!=='all'&&currentCat!==b.cat)document.querySelector('.pill[data-cat="all"]').click();
      highlightItem(b.code,true);
    });
    sr.appendChild(item);
  });
  sr.style.display='block';
});
document.addEventListener('click',e=>{if(!e.target.closest('.sw'))sr.style.display='none';});
</script>
